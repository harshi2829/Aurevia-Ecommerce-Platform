
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-100 via-rose-100 to-pink-50 px-4 overflow-hidden relative">

  <!-- TOAST -->
  <div *ngIf="showToast"
       class="fixed top-5 right-5 px-6 py-3 rounded-2xl shadow-xl text-white font-semibold z-50 transition-all duration-300"
       [ngClass]="{
         'bg-green-500': toastType === 'success',
         'bg-red-500': toastType === 'error'
       }">

    {{ toastMessage }}

  </div>

  <!-- BLUR -->
  <div class="absolute top-0 left-0 w-72 h-72 bg-pink-300/30 rounded-full blur-3xl"></div>
  <div class="absolute bottom-0 right-0 w-72 h-72 bg-rose-200/40 rounded-full blur-3xl"></div>

  <!-- CARD -->
  <div
    class="relative w-full max-w-5xl min-h-[580px] bg-white/70 backdrop-blur-2xl rounded-[2rem] shadow-2xl overflow-hidden border border-pink-200 flex animate-[fadeIn_0.5s_ease]"
  >

    <!-- LEFT SIDE -->
    <div
      class="hidden md:flex w-1/2 bg-[#6b3e38] text-pink-100 p-12 flex-col justify-center relative overflow-hidden"
    >

      <div class="absolute -top-10 -right-10 w-56 h-56 bg-pink-300/10 rounded-full blur-3xl"></div>

      <div class="relative z-10">

        <div class="w-16 h-16 rounded-2xl bg-pink-100/10 border border-pink-100/20 flex items-center justify-center mb-6">
          💎
        </div>

        <h1 class="text-4xl font-black leading-tight">
          Welcome Back
        </h1>

        <p class="mt-5 text-pink-200 leading-7">
          Discover elegant jewelry collections crafted with beauty and timeless luxury.
        </p>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center">

      <h2 class="text-4xl font-black text-[#6b3e38]">
        Login
      </h2>

      <p class="mt-2 text-[#9b6b63]">
        Enter your account details
      </p>

      <!-- FORM -->
      <div class="mt-10 space-y-5">

        <!-- USERNAME -->
        <input
          type="text"
          [(ngModel)]="myLogObj.username"
          placeholder="Enter username or email"
          class="w-full bg-white border border-pink-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-pink-300 text-[#6b3e38]"
        />

        <!-- PASSWORD -->
        <input
          type="password"
          [(ngModel)]="myLogObj.password"
          placeholder="Enter password"
          class="w-full bg-white border border-pink-200 rounded-2xl px-5 py-4 outline-none focus:ring-2 focus:ring-pink-300 text-[#6b3e38]"
        />

      </div>

      <!-- BUTTON -->
      <button
        (click)="onLog()"
        class="mt-8 w-full bg-[#6b3e38] hover:bg-[#7d4a43] text-pink-100 py-4 rounded-2xl font-bold shadow-lg hover:scale-[1.01] active:scale-95 transition duration-300"
      >
        Login
      </button>

      <!-- FOOTER -->
      <p class="text-center mt-6 text-[#9b6b63]">
        Dont have an account?
        <a routerLink="/register" class="font-bold text-[#6b3e38] hover:underline">
          Register
        </a>
      </p>

    </div>

  </div>

</div>
