<div class="min-h-screen bg-gradient-to-br from-pink-50 via-rose-50 to-pink-100 p-6 md:p-10">

  <!-- TITLE -->
  <div class="mb-12 text-center">

    <h1 class="text-5xl md:text-6xl font-black text-[#6b3e38]">
      Necklaces Collection
    </h1>

    <p class="text-[#9b6b63] mt-4 text-lg">
      Explore elegant gold, diamond, platinum & silver necklaces
    </p>

     <!-- BACK BUTTON -->
      <div class="flex justify-end">
    <button
      routerLink="/layout/home"
      class="bg-[#6b3e38] text-pink-100 px-6 py-3 rounded-2xl
             shadow-lg hover:scale-105 transition duration-300">

      ← Back To Home

    </button>
    </div>

  </div>

  <!-- GRID -->
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-10">

    <!-- CARD -->
    <div
      *ngFor="let necklace of necklaces"
      class="group bg-white/80 backdrop-blur-xl rounded-[2rem]
             overflow-hidden border border-pink-200
             shadow-xl hover:shadow-2xl
             hover:-translate-y-2
             transition duration-500"
    >

      <!-- IMAGE -->
      <div class="overflow-hidden relative">

        <img
          [src]="necklace.image"
          class="w-full h-[420px] object-cover group-hover:scale-110 transition duration-700"
        />

        <!-- CATEGORY BADGE -->
        <div
          class="absolute top-4 left-4 bg-white/90 backdrop-blur-md
                 px-4 py-1 rounded-full text-sm
                 font-bold text-[#6b3e38] shadow"
        >

          Luxury Necklace

        </div>

      </div>

      <!-- CONTENT -->
      <div class="p-6">

        <!-- NAME -->
        <h2 class="text-2xl font-black text-[#6b3e38]">

          {{ necklace.name }}

        </h2>

        <!-- DESCRIPTION -->
        <p class="text-[#9b6b63] mt-3 leading-6">

          Premium handcrafted jewellry designed for timeless elegance and beauty.

        </p>

        <!-- PRICE -->
        <div class="mt-5 flex items-center gap-3">

          <p class="text-3xl font-black text-[#6b3e38]">

            ₹{{ necklace.price }}

          </p>

          <span
            class="bg-pink-100 text-[#6b3e38]
                   px-3 py-1 rounded-full
                   text-xs font-bold"
          >

            Bestseller

          </span>

        </div>

<!-- BUTTONS -->
<div class="mt-6 flex gap-3">

  <!-- ADD TO CART / QUANTITY STEPPER -->
  <div class="flex-1">

    <button
      *ngIf="necklace.quantity === 0"
      (click)="addToCart(necklace)"
      class="w-full bg-[#6b3e38]
             hover:bg-[#7d4a43]
             text-pink-100 py-3 rounded-2xl
             font-bold tracking-wide
             hover:scale-105
             active:scale-95
             transition duration-300 shadow-lg">
      🛒 Add To Cart
    </button>

    <div
      *ngIf="necklace.quantity > 0"
      class="w-full flex items-center justify-between
             bg-[#6b3e38] text-pink-100
             py-2 px-4 rounded-2xl shadow-lg">

      <button
        (click)="decreaseQty(necklace)"
        class="w-8 h-8 flex items-center justify-center
               rounded-full bg-pink-100/20 hover:bg-pink-100/40
               font-bold text-lg transition">
        −
      </button>

      <span class="font-semibold">{{ necklace.quantity }}</span>

      <button
        (click)="increaseQty(necklace)"
        class="w-8 h-8 flex items-center justify-center
               rounded-full bg-pink-100/20 hover:bg-pink-100/40
               font-bold text-lg transition">
        +
      </button>

    </div>

  </div>

  <!-- WISHLIST -->
  <button
    (click)="toggleWishlist(necklace)"
    class="px-5 rounded-2xl border border-pink-200
           hover:bg-pink-200 transition duration-300
           flex items-center justify-center text-xl"
    [class.bg-pink-100]="!necklace.wishlistId"
    [class.bg-pink-300]="necklace.wishlistId">
    {{ necklace.wishlistId ? '❤️' : '🤍' }}
  </button>

</div>

          
        </div>

      </div>

    </div>

  </div>
