<div class="min-h-screen bg-gradient-to-br 
            from-pink-50 via-rose-50 to-pink-100 
            p-4 md:p-6 lg:p-10">

  <!-- TITLE -->
  <div class="mb-6 md:mb-12 text-center">
    <h1 class="text-2xl md:text-5xl lg:text-6xl 
               font-black text-[#6b3e38]">
      Necklaces Collection
    </h1>
    <p class="text-[#9b6b63] mt-2 md:mt-4 
              text-sm md:text-lg">
      Explore elegant gold, diamond, platinum & silver necklaces
    </p>
    <div class="flex justify-center md:justify-end mt-3 md:mt-4">
      <button
        routerLink="/layout/home"
        class="bg-[#6b3e38] text-pink-100 
               px-4 py-2 md:px-6 md:py-3
               text-sm md:text-base
               rounded-2xl shadow-lg 
               hover:scale-105 transition duration-300">
        ← Back To Home
      </button>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid grid-cols-1 sm:grid-cols-2 
              lg:grid-cols-3 gap-6 md:gap-10">

    <div
      *ngFor="let necklace of necklaces"
      class="group bg-white/80 backdrop-blur-xl rounded-[2rem]
             overflow-hidden border border-pink-200
             shadow-xl hover:shadow-2xl
             hover:-translate-y-2 transition duration-500">

      <!-- IMAGE -->
      <div class="overflow-hidden relative">
        <img
          [src]="necklace.image"
          class="w-full h-[220px] md:h-[320px] lg:h-[420px] 
                 object-cover group-hover:scale-110 
                 transition duration-700"
        />
        <div class="absolute top-4 left-4 bg-white/90 
                    backdrop-blur-md px-3 py-1 rounded-full 
                    text-xs md:text-sm font-bold 
                    text-[#6b3e38] shadow">
          Luxury Necklace
        </div>
      </div>

      <!-- CONTENT -->
      <div class="p-4 md:p-6">
        <h2 class="text-lg md:text-2xl font-black text-[#6b3e38]">
          {{ necklace.name }}
        </h2>
        <p class="text-[#9b6b63] mt-2 md:mt-3 
                  leading-6 text-sm md:text-base">
          Premium handcrafted jewellry designed for 
          timeless elegance and beauty.
        </p>
        <div class="mt-4 md:mt-5 flex items-center gap-3">
          <p class="text-xl md:text-3xl font-black text-[#6b3e38]">
            ₹{{ necklace.price }}
          </p>
          <span class="bg-pink-100 text-[#6b3e38]
                       px-3 py-1 rounded-full
                       text-xs font-bold">
            Bestseller
          </span>
        </div>

        <!-- BUTTONS -->
        <div class="mt-4 md:mt-6 flex gap-3">
          <div class="flex-1">
            <button
              *ngIf="necklace.quantity === 0"
              (click)="addToCart(necklace)"
              class="w-full bg-[#6b3e38] hover:bg-[#7d4a43]
                     text-pink-100 py-2 md:py-3 
                     text-sm md:text-base
                     rounded-2xl font-bold
                     hover:scale-105 active:scale-95
                     transition duration-300 shadow-lg">
              🛒 Add To Cart
            </button>
            <div
              *ngIf="necklace.quantity > 0"
              class="w-full flex items-center justify-between
                     bg-[#6b3e38] text-pink-100
                     py-2 px-3 md:px-4 rounded-2xl shadow-lg">
              <button (click)="decreaseQty(necklace)"
                class="w-7 h-7 md:w-8 md:h-8 flex items-center 
                       justify-center rounded-full bg-pink-100/20 
                       hover:bg-pink-100/40 font-bold text-lg transition">
                −
              </button>
              <span class="font-semibold text-sm md:text-base">
                {{ necklace.quantity }}
              </span>
              <button (click)="increaseQty(necklace)"
                class="w-7 h-7 md:w-8 md:h-8 flex items-center 
                       justify-center rounded-full bg-pink-100/20 
                       hover:bg-pink-100/40 font-bold text-lg transition">
                +
              </button>
            </div>
          </div>
          <button
            (click)="toggleWishlist(necklace)"
            class="w-12 md:w-14 rounded-2xl border border-pink-200
                   hover:bg-pink-200 transition duration-300
                   flex items-center justify-center 
                   text-lg md:text-xl"
            [class.bg-pink-100]="!necklace.wishlistId"
            [class.bg-pink-300]="necklace.wishlistId">
            {{ necklace.wishlistId ? '❤️' : '🤍' }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
