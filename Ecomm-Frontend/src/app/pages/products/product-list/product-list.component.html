<div class="min-h-screen bg-pink-50 px-6 py-10">

  <h1 class="text-3xl font-bold text-[#6b3e38] mb-8">
    Products
  </h1>

  <div class="grid md:grid-cols-3 gap-6">

    <div
      *ngFor="let p of products"
      class="bg-white rounded-2xl shadow-lg overflow-hidden hover:scale-105 transition"
    >

      <!-- Product click (view details) -->
      <div (click)="viewProduct(p.id)" class="cursor-pointer">

        <img [src]="p.imageUrl" class="h-52 w-full object-cover" />

        <div class="p-4">
          <p class="font-bold text-[#6b3e38]">{{ p.name }}</p>
          <p class="text-[#9b6b63]">₹{{ p.price }}</p>
        </div>

      </div>

      <!-- Add to Cart Button -->
      <div class="p-4 pt-0">
        <button
          class="w-full bg-[#6b3e38] text-white py-2 rounded-lg hover:bg-[#522f2a] transition"
          (click)="addToCart(p); $event.stopPropagation()"
        >
          Add to Cart
        </button>
      </div>

    </div>

  </div>

</div>
