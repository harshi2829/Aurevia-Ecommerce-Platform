<div class="min-h-screen bg-gradient-to-br 
            from-pink-50 via-rose-50 to-pink-100 
            px-4 md:px-16 py-6 md:py-10">

  <!-- TITLE -->
  <div class="mb-6 md:mb-10">
    <h1 class="text-2xl md:text-4xl lg:text-5xl 
               font-black text-[#6b3e38]">
      My Wishlist ❤️
    </h1>
    <p class="mt-1 md:mt-2 text-[#9b6b63] 
              text-sm md:text-base">
      Your favorite luxury jewellry collections
    </p>
  </div>

  <!-- EMPTY WISHLIST -->
  <div
    *ngIf="wishlistItems.length === 0"
    class="bg-white/70 backdrop-blur-xl rounded-[2rem] 
           border border-pink-200 p-8 md:p-10 
           text-center shadow-xl">
    <div class="text-5xl md:text-6xl mb-4">💖</div>
    <h2 class="text-xl md:text-2xl font-bold text-[#6b3e38]">
      Wishlist Is Empty
    </h2>
    <p class="mt-3 text-[#9b6b63] text-sm md:text-base">
      Save your favorite jewellry items here.
    </p>
    <button
      routerLink="/layout/home"
      class="mt-6 bg-[#6b3e38] text-pink-100
             px-6 md:px-8 py-3 rounded-2xl font-bold
             hover:bg-[#7d4a43] transition">
      Explore Collections
    </button>
  </div>

  <!-- WISHLIST GRID -->
  <div
    *ngIf="wishlistItems.length > 0"
    class="grid grid-cols-1 sm:grid-cols-2 
           lg:grid-cols-3 gap-6 md:gap-8">
<!--        ↑ 1 col mobile, 2 tablet, 3 desktop -->

    <div
      *ngFor="let item of wishlistItems"
      class="bg-white/70 backdrop-blur-xl border 
             border-pink-200 rounded-[2rem] 
             overflow-hidden shadow-2xl 
             hover:scale-[1.02] transition duration-300">

      <!-- IMAGE -->
      <div class="overflow-hidden">
        <img
          [src]="item.imageUrl"
          class="w-full h-52 md:h-72 object-cover 
                 hover:scale-105 transition duration-500"
        />
<!--              ↑ h-52 mobile (was h-72 — too tall!) -->
      </div>

      <!-- CONTENT -->
      <div class="p-4 md:p-6">
        <h2 class="text-lg md:text-2xl font-black text-[#6b3e38]">
          {{ item.productName }}
        </h2>
        <p class="mt-2 text-[#9b6b63] 
                  text-xs md:text-sm leading-6">
          Elegant handcrafted jewellry designed for 
          timeless beauty and luxury.
        </p>
        <div class="mt-4 md:mt-5 flex items-center justify-between">
          <span class="text-xl md:text-3xl font-black text-[#6b3e38]">
            ₹{{ item.price }}
          </span>
          <span class="bg-pink-100 text-[#6b3e38] 
                       px-3 py-1 rounded-full 
                       text-xs md:text-sm font-semibold">
            Premium
          </span>
        </div>

        <!-- BUTTONS -->
        <div class="mt-4 md:mt-6 flex gap-3">
          <button
            (click)="removeWishlistItem(item.id)"
            class="flex-1 bg-red-100 hover:bg-red-200 
                   text-red-600 py-2 md:py-3 
                   text-sm md:text-base
                   rounded-2xl font-bold transition">
            Remove
          </button>
          <button
            class="w-12 md:w-14 rounded-2xl bg-pink-100 
                   border border-pink-200 
                   flex items-center justify-center 
                   text-lg md:text-xl 
                   hover:scale-110 transition">
            ❤️
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
