<div class="min-h-screen bg-gradient-to-br from-pink-50 via-rose-50 to-pink-100 px-4 md:px-16 py-10">

  <!-- TITLE -->
  <div class="mb-10">

    <h1 class="text-4xl md:text-5xl font-black text-[#6b3e38]">
      My Wishlist ❤️
    </h1>

    <p class="mt-2 text-[#9b6b63]">
      Your favorite luxury jewelry collections
    </p>

  </div>

  <!-- EMPTY WISHLIST -->
  <div
    *ngIf="wishlistItems.length === 0"
    class="bg-white/70 backdrop-blur-xl rounded-[2rem] border border-pink-200 p-10 text-center shadow-xl"
  >

    <div class="text-6xl mb-4">
      💖
    </div>

    <h2 class="text-2xl font-bold text-[#6b3e38]">
      Wishlist Is Empty
    </h2>

    <p class="mt-3 text-[#9b6b63]">
      Save your favorite jewelry items here.
    </p>

  </div>

  <!-- WISHLIST GRID -->
  <div
    *ngIf="wishlistItems.length > 0"
    class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8"
  >

    <!-- PRODUCT CARD -->
    <div
      *ngFor="let item of wishlistItems"
      class="bg-white/70 backdrop-blur-xl border border-pink-200 rounded-[2rem] overflow-hidden shadow-2xl hover:scale-[1.02] transition duration-300"
    >

      <!-- IMAGE -->
      <div class="overflow-hidden">

        <img
          [src]="item.imageUrl"
          class="w-full h-72 object-cover hover:scale-105 transition duration-500"
        />

      </div>

      <!-- CONTENT -->
      <div class="p-6">

        <!-- NAME -->
        <h2 class="text-2xl font-black text-[#6b3e38]">
          {{ item.productName }}
        </h2>

        <!-- DESCRIPTION -->
        <p class="mt-2 text-[#9b6b63] text-sm leading-6">
          Elegant handcrafted jewelry designed for timeless beauty and luxury.
        </p>

        <!-- PRICE -->
        <div class="mt-5 flex items-center justify-between">

          <span class="text-3xl font-black text-[#6b3e38]">
            ₹{{ item.price }}
          </span>

          <span class="bg-pink-100 text-[#6b3e38] px-3 py-1 rounded-full text-sm font-semibold">
            Premium
          </span>

        </div>

        <!-- BUTTONS -->
        <div class="mt-6 flex gap-3">

          <!-- REMOVE -->
          <button
            (click)="removeWishlistItem(item.id)"
            class="flex-1 bg-red-100 hover:bg-red-200 text-red-600 py-3 rounded-2xl font-bold transition"
          >
            Remove
          </button>

          <!-- FAVORITE -->
          <button
            class="w-14 rounded-2xl bg-pink-100 border border-pink-200 flex items-center justify-center text-xl hover:scale-110 transition"
          >
            ❤️
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
