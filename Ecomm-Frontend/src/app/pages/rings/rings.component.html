<div class="min-h-screen bg-gradient-to-br 
            from-pink-50 via-rose-50 to-pink-100 
            p-4 md:p-6 lg:p-10">
<!--        ↑ p-4 mobile, p-6 tablet, p-10 desktop -->

  <!-- HEADER -->
  <div class="flex flex-col md:flex-row md:items-center 
              md:justify-between gap-3 md:gap-4 mb-6 md:mb-10">

    <div>
      <h1 class="text-2xl md:text-4xl lg:text-5xl 
                 font-black text-[#6b3e38]">
<!--              ↑ text-2xl mobile (was text-4xl — too big!) -->
        Rings Collection
      </h1>
      <p class="text-[#9b6b63] mt-1 md:mt-2 
                text-sm md:text-lg">
<!--              ↑ smaller on mobile -->
        Explore elegant gold, diamond, silver & platinum rings.
      </p>
    </div>

    <!-- BACK BUTTON -->
    <button
      routerLink="/layout/home"
      class="self-start md:self-auto
             bg-[#6b3e38] text-pink-100 
             px-4 py-2 md:px-6 md:py-3 
             text-sm md:text-base
             rounded-2xl shadow-lg 
             hover:scale-105 transition duration-300">
<!--    ↑ self-start so button aligns left on mobile -->
      ← Back To Home
    </button>

  </div>

  <!-- TOAST -->
  <div
    *ngIf="showToast"
    class="fixed top-[18px] left-1/2 -translate-x-1/2 z-[100]
           bg-[#6b3e38] text-pink-100
           px-6 py-3 rounded-2xl shadow-xl
           transition-opacity duration-300">
    ✅ Added to Cart!
  </div>

  <!-- PRODUCTS GRID -->
  <div class="grid grid-cols-1 sm:grid-cols-2 
              lg:grid-cols-3 gap-6 md:gap-10">
<!--              ↑ 1 col mobile, 2 col tablet, 3 col desktop -->
<!--                                             ↑ gap-6 mobile -->

    <!-- CARD -->
    <div
      *ngFor="let ring of rings"
      class="group bg-white/80 backdrop-blur-xl
             rounded-[2rem] overflow-hidden
             border border-pink-200 shadow-xl
             hover:-translate-y-2 hover:shadow-2xl
             transition duration-500">

      <!-- IMAGE -->
      <div class="relative overflow-hidden">
        <img
          [src]="ring.image"
          class="h-[220px] md:h-[320px] lg:h-[420px] 
                 w-full object-cover
                 group-hover:scale-110
                 transition duration-700"
        />
<!--          ↑ h-220 mobile (was 420 — way too tall!) -->
<!--                    ↑ h-320 tablet -->
<!--                               ↑ h-420 desktop -->

        <!-- BADGE -->
        <div class="absolute top-4 left-4
                    bg-[#6b3e38] text-pink-100
                    px-3 py-1 rounded-full
                    text-xs md:text-sm 
                    font-semibold shadow-lg">
<!--                  ↑ smaller text on mobile -->
          Premium Ring
        </div>
      </div>

      <!-- CONTENT -->
      <div class="p-4 md:p-6">
<!--              ↑ p-4 mobile, p-6 desktop -->

        <!-- NAME -->
        <h2 class="text-lg md:text-2xl font-black text-[#6b3e38]">
<!--              ↑ smaller on mobile -->
          {{ ring.name }}
        </h2>

        <!-- DESCRIPTION -->
        <p class="text-[#9b6b63] mt-2 md:mt-3 
                  leading-6 text-sm md:text-base">
<!--              ↑ smaller on mobile -->
          Handcrafted luxury ring with premium finish 
          and timeless elegance.
        </p>

        <!-- PRICE -->
        <div class="mt-4 md:mt-5 flex items-center justify-between">
          <p class="text-xl md:text-3xl font-black text-[#6b3e38]">
<!--              ↑ text-xl mobile (was text-3xl) -->
            ₹{{ ring.price }}
          </p>
          <div class="bg-pink-100 text-[#6b3e38]
                      px-3 py-1 rounded-full
                      text-xs md:text-sm font-bold">
            Bestseller
          </div>
        </div>

        <!-- BUTTONS -->
        <div class="mt-4 md:mt-6 flex gap-3">

          <!-- ADD TO CART / QUANTITY STEPPER -->
          <div class="flex-1">

            <button
              *ngIf="ring.quantity === 0"
              (click)="addToCart(ring)"
              class="w-full bg-[#6b3e38]
                     text-pink-100 py-2 md:py-3 
                     text-sm md:text-base
                     rounded-2xl font-semibold 
                     hover:bg-[#7d4a43]
                     hover:scale-105 transition 
                     duration-300 shadow-lg">
<!--              ↑ py-2 mobile, py-3 desktop -->
              🛒 Add To Cart
            </button>

            <div
              *ngIf="ring.quantity > 0"
              class="w-full flex items-center justify-between
                     bg-[#6b3e38] text-pink-100
                     py-2 px-3 md:px-4 rounded-2xl shadow-lg">
              <button
                (click)="decreaseQty(ring)"
                class="w-7 h-7 md:w-8 md:h-8 
                       flex items-center justify-center
                       rounded-full bg-pink-100/20 
                       hover:bg-pink-100/40
                       font-bold text-lg transition">
                −
              </button>
              <span class="font-semibold text-sm md:text-base">
                {{ ring.quantity }}
              </span>
              <button
                (click)="increaseQty(ring)"
                class="w-7 h-7 md:w-8 md:h-8 
                       flex items-center justify-center
                       rounded-full bg-pink-100/20 
                       hover:bg-pink-100/40
                       font-bold text-lg transition">
                +
              </button>
            </div>

          </div>

          <!-- WISHLIST -->
          <button
            (click)="toggleWishlist(ring)"
            class="w-12 md:w-14 rounded-2xl border border-pink-200
                   hover:bg-pink-200 transition
                   flex items-center justify-center 
                   text-lg md:text-xl"
            [class.bg-pink-100]="!ring.wishlistId"
            [class.bg-pink-300]="ring.wishlistId">
            {{ ring.wishlistId ? '❤️' : '🤍' }}
          </button>

        </div>
      </div>
    </div>
  </div>
</div>
