<div class="min-h-screen bg-gradient-to-br from-pink-50 via-rose-50 to-pink-100 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white/80 backdrop-blur-md rounded-3xl shadow-xl border border-pink-200 overflow-hidden">

    <!-- TOP BANNER -->
    <div class="h-24 bg-[#6b3e38]"></div>

    <!-- AVATAR -->
    <div class="flex flex-col items-center -mt-12 px-8 pb-8">

      <div class="w-24 h-24 rounded-full bg-pink-100 border-4 border-white shadow-lg flex items-center justify-center text-[#6b3e38] text-3xl font-bold">
        {{ initials }}
      </div>

      <h2 class="mt-4 text-2xl font-black text-[#6b3e38]">{{ username }}</h2>
      <p class="text-sm text-[#9b6b63] mt-1">{{ email }}</p>

      <!-- DIVIDER -->
      <div class="w-full h-px bg-pink-100 my-6"></div>

      <!-- ACCOUNT DETAILS -->
      <div class="w-full space-y-4">

        <h3 class="text-xs uppercase tracking-widest text-[#9b6b63] font-semibold">
          Account Details
        </h3>

        <!-- USERNAME ROW -->
        <div class="flex items-center gap-4 bg-pink-50 rounded-2xl px-5 py-4">
          <div class="w-9 h-9 rounded-full bg-pink-100 flex items-center justify-center text-[#6b3e38]">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.75" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
            </svg>
          </div>
          <div>
            <p class="text-[10px] uppercase tracking-widest text-[#9b6b63]">Username</p>
            <p class="text-sm font-semibold text-[#6b3e38]">{{ username }}</p>
          </div>
        </div>

        <!-- EMAIL ROW -->
        <div class="flex items-center gap-4 bg-pink-50 rounded-2xl px-5 py-4">
          <div class="w-9 h-9 rounded-full bg-pink-100 flex items-center justify-center text-[#6b3e38]">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.75" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
            </svg>
          </div>
          <div>
            <p class="text-[10px] uppercase tracking-widest text-[#9b6b63]">Email</p>
            <p class="text-sm font-semibold text-[#6b3e38]">{{ email }}</p>
          </div>
        </div>

      </div>

      <!-- DIVIDER -->
      <div class="w-full h-px bg-pink-100 my-6"></div>

      <!-- LOGOUT BUTTON -->
      <button
        (click)="logout()"
        class="w-full py-4 rounded-2xl border-2 border-[#6b3e38] text-[#6b3e38] font-bold hover:bg-[#6b3e38] hover:text-pink-50 transition duration-300">
        Logout
      </button>

    </div>

  </div>

</div>

<!-- LOGOUT CONFIRMATION MODAL -->
<div *ngIf="showLogoutConfirm"
  class="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[200]">

  <div class="bg-white rounded-3xl shadow-2xl border border-pink-200 p-8 w-full max-w-sm mx-4 text-center">

    <!-- ICON -->
    <div class="w-16 h-16 rounded-full bg-pink-100 flex items-center justify-center mx-auto mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
        stroke-width="1.75" stroke="#6b3e38" class="w-8 h-8">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
      </svg>
    </div>

    <h3 class="text-xl font-black text-[#6b3e38]">Logout?</h3>
    <p class="text-sm text-[#9b6b63] mt-2 mb-6">
      Are you sure you want to logout from your Aurevia account?
    </p>

    <!-- BUTTONS -->
    <div class="flex gap-3">

      <!-- CANCEL -->
      <button
        (click)="showLogoutConfirm = false"
        class="flex-1 py-3 rounded-2xl border-2 border-pink-200 text-[#6b3e38] font-semibold hover:bg-pink-50 transition duration-200">
        Cancel
      </button>

      <!-- CONFIRM -->
      <button
        (click)="confirmLogout()"
        class="flex-1 py-3 rounded-2xl bg-[#6b3e38] text-pink-50 font-semibold hover:bg-[#7d4a43] transition duration-200">
        Yes, Logout
      </button>

    </div>

  </div>

</div>
